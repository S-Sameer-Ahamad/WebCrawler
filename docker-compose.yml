version: "3.9"

services:
  crawler:
    build: .
    ports:
      - "8765:8765"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8765/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
